<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrossel Completo CSS e JS</title>
    <style>
        /* ==============================
           CSS - Estilização e Estrutura
           ============================== */
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }

        /* Nossa Tag Customizada - A moldura do carrossel */
        meu-carrossel {
            display: block; /* Tags inventadas precisam definir display */
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: auto;
            padding: 0 50px; /* Espaço para os botões */
            box-sizing: border-box;
        }

        /* O trilho (container do scroll) */
        .carousel-track {
            display: flex;
            overflow-x: auto; /* Habilita o scroll horizontal */
            scroll-snap-type: x mandatory; /* O SEGREDO DO CSS: Força o encaixe */
            scroll-behavior: smooth; /* Suaviza a rolagem pelo JS ou âncoras */
            gap: 15px;
            padding: 10px 0;
            
            /* Esconde a barra de rolagem (opcional) */
            -webkit-overflow-scrolling: touch; /* Melhora scroll no iOS */
        }
        
        .carousel-track::-webkit-scrollbar {
            display: none; /* Esconde no Chrome/Safari */
        }

        /* Estilo dos Slides (Itens) */
        .carousel-item {
            flex: 0 0 100%; /* Cada slide ocupa 100% da largura visual */
            height: 400px;
            background-color: #3498db;
            color: white;
            font-size: 3rem;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            
            scroll-snap-align: start; /* Alinha o início do item ao início do container */
        }

        /* Cores diferentes para identificar */
        .carousel-item:nth-child(2) { background-color: #e74c3c; }
        .carousel-item:nth-child(3) { background-color: #2ecc71; }
        .carousel-item:nth-child(4) { background-color: #f1c40f; color: #333; }

        /* Botões de Navegação */
        .btn-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            z-index: 10;
            transition: background 0.3s;
        }

        .btn-nav:hover {
            background-color: rgba(0, 0, 0, 0.8);
        }

        .btn-nav.prev { left: 0; }
        .btn-nav.next { right: 0; }

    </style>
</head>
<body>

    <meu-carrossel>
        <button class="btn-nav prev" id="prevBtn" aria-label="Slide Anterior">❮</button>
        
        <div class="carousel-track" id="carouselTrack">
            <div class="carousel-item">Slide 1</div>
            <div class="carousel-item">Slide 2</div>
            <div class="carousel-item">Slide 3</div>
            <div class="carousel-item">Slide 4</div>
        </div>

        <button class="btn-nav next" id="nextBtn" aria-label="Próximo Slide">❯</button>
    </meu-carrossel>

    <script>
        /* ==============================
           JavaScript - Lógica de Movimento
           ============================== */
        const track = document.getElementById('carouselTrack');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');

        // Função para mover o slide
        function move(direction) {
            // Descobre a largura de um item (incluindo o gap se houver, usando clientWidth)
            const itemWidth = track.firstElementChild.clientWidth;
            
            // Calcula o gap (espaçamento) real
            const computedStyle = getComputedStyle(track);
            const gap = parseInt(computedStyle.gap) || 0;

            // Define a quantidade do scroll (largura do item + espaçamento)
            const scrollAmount = itemWidth + gap;

            // scrollBy rola "relativo" à posição atual
            track.scrollBy({
                left: scrollAmount * direction,
                behavior: 'smooth' // Garante a animação suave
            });
        }

        // Eventos dos botões
        // Direction 1 = Próximo (Direita)
        nextBtn.addEventListener('click', () => move(1));
        
        // Direction -1 = Anterior (Esquerda)
        prevBtn.addEventListener('click', () => move(-1));
    </script>

</body>
</html>
