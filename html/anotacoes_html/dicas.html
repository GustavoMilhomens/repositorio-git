<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>dicas</title>
        <style>
            body{
                background-color: rgb(51, 51, 51);
                color: #ffffff;
            }
            input{
                background-color: rgb(158, 157, 157);
            }
            
        </style>
    </head>
    <body>
        <!-- para criar algo mais rapido é so fazer uma tag junta a outra
         exemplo quero 3 div com 3 inputs é so colocar div*3>input*3>
         -->
        <div><input type="text"><input type="text"><input type="text"></div>
        <div><input type="text"><input type="text"><input type="text"></div>
        <div><input type="text"><input type="text"><input type="text"></div>
        <!-- e para alterar o tipo é so colocar : e o tipo 
         exemplo 3 inputs do tipo butão seria input:button*3-->
        <input type="button" value=""><input type="button" value=""><input type="button" value="">
        <!-- se colocar um ponto vc pode colocar uma classe ex input.cor 
         e com o $ vc edida numeros desse valor  
         exemplo input.cor$*3-->
        <input type="text" class="cor1">
        <input type="text" class="cor2">
        <input type="text" class="cor3">

        <!-- se usar o alt consegue editar mais de uma linha caso clicar nela antes
        se usar o alt + shift consegue fazer o mesmo que o anterior so que na mesma linha  -->
    
    </body>
</html>
