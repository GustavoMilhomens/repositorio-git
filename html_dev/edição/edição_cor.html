<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Calculadora</title>
        <style>
            .centro{
                text-align: center;
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }
        </style>
    </head>
    <body id="fundo">
        <div class="centro">
            <input type="color" name="" id="cor" value="rgb(2, 100, 255)">
            <input type="button" onclick="cor_alt()" value="confirmar">
            
        </div>
        <script>
            function cor_alt(){
                let cor_elemento = document.getElementById('fundo');
                cor_elemento.style.backgroundColor = document.getElementById('cor').value;
            }
        </script>
    </body>
</html>
