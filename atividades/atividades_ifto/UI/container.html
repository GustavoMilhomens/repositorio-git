        <button class="open-btn posicao" onclick="toggleSidebar()">☰ Menu</button>
        <div id="mySidebar" class="sidebar posicao">
            
            <a href="javascript:void(0)" class="close-btn" onclick="toggleSidebar()">&times;</a>
            
            <h2>Usuário</h2>
            <hr>
            
            <a href="#perfil">Meu Perfil</a>

            <details class="submenu">
                <summary>Configurações ▾</summary>
                <div class="submenu-content">
                <a href="#tema">Mudar Tema</a>
                <a href="#senha">Alterar Senha</a>
                <a href="#privacidade">Privacidade</a>
                </div>
            </details>

            <a href="#sair">Sair</a>
        </div>
        <script>
            function toggleSidebar() {
                const sidebar = document.getElementById("mySidebar");
                sidebar.classList.toggle("active");
            }
        </script>
